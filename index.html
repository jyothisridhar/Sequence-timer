<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Meditation Timer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050510;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      user-select: none;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Main Configuration Panel */
    .ui-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      text-align: center;
      background: rgba(10, 10, 25, 0.85);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: opacity 0.5s ease, transform 0.5s ease;
      width: 85%;
      max-width: 400px;
    }

    .ui-container.hidden {
      opacity: 0;
      transform: translate(-50%, -45%) scale(0.95);
      pointer-events: none;
    }

    h1 {
      font-weight: 300;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #7a88ff;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, #4a58ff, #a044ff);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    /* Live Meditation Stats Dashboard Overlay */
    #dashboard {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 90%;
      max-width: 500px;
      display: flex;
      justify-content: space-around;
      background: rgba(5, 5, 15, 0.4);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 15px 10px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #dashboard.visible {
      opacity: 1;
      visibility: visible;
    }

    .stat-box {
      flex: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8a99ad;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 300;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
    }

    /* Tap Screen to Pause notice at the bottom */
    #tapHint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #tapHint.visible {
      opacity: 1;
    }
  </style>
</head>

<body>

  <canvas id="galaxyCanvas"></canvas>

  <div id="dashboard">
    <div class="stat-box">
      <div class="stat-label">Elapsed</div>
      <div id="valElapsed" class="stat-value">00:00</div>
    </div>
    <div class="stat-box"
      style="border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);">
      <div class="stat-label">Next Beep</div>
      <div id="valNextBeep" class="stat-value">--:--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Remaining</div>
      <div id="valRemaining" class="stat-value">00:00</div>
    </div>
  </div>

  <p id="tapHint">Tap anywhere to pause</p>

  <div id="ui" class="ui-container">
    <h1 id="menuTitle">Meditation</h1>
    <div class="input-group">
      <label for="duration">Total Duration (Minutes)</label>
      <input type="number" id="duration" value="10" min="1">
    </div>
    <div class="input-group">
      <label for="intervals">Beep at Minutes (comma separated)</label>
      <input type="text" id="intervals" value="3, 5, 7" placeholder="e.g. 3, 5, 8">
    </div>
    <button id="startBtn">Begin Session</button>
  </div>

  <script>
    // --- Core UI Variables ---
    const ui = document.getElementById('ui');
    const startBtn = document.getElementById('startBtn');
    const menuTitle = document.getElementById('menuTitle');
    const durationInput = document.getElementById('duration');
    const intervalsInput = document.getElementById('intervals');

    // Dashboard metric fields
    const dashboard = document.getElementById('dashboard');
    const tapHint = document.getElementById('tapHint');
    const valElapsed = document.getElementById('valElapsed');
    const valNextBeep = document.getElementById('valNextBeep');
    const valRemaining = document.getElementById('valRemaining');

    let totalSeconds = 0;
    let secondsElapsed = 0;
    let intervalTimestamps = [];
    let timerInterval = null;
    let audioCtx = null;

    let isRunning = false;
    let isPaused = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playChime() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 3);
    }

    // Helper string formatter (converts seconds to MM:SS format)
    function formatTime(sec) {
      if (sec < 0 || isNaN(sec)) return "--:--";
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = (sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // Primary Action Controller
    startBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // Stop click from bleeding into window backdrop
      initAudio();

      if (!isPaused) {
        const mins = parseFloat(durationInput.value) || 10;
        totalSeconds = mins * 60;
        secondsElapsed = 0;

        intervalTimestamps = intervalsInput.value
          .split(',')
          .map(val => Math.round(parseFloat(val.trim()) * 60))
          .filter(val => !isNaN(val) && val > 0 && val < totalSeconds)
          .sort((a, b) => a - b); // Keep numerical order intact

        playChime();
      }

      isRunning = true;
      isPaused = false;

      ui.classList.add('hidden');
      dashboard.classList.add('visible');
      tapHint.classList.add('visible');

      updateDashboardUI();
      timerInterval = setInterval(tick, 1000);
    });

    // Tap Backdrop to Pause System
    window.addEventListener('click', () => {
      if (isRunning) {
        clearInterval(timerInterval);
        isRunning = false;
        isPaused = true;

        menuTitle.innerText = "Paused";
        startBtn.innerText = "Resume Session";

        ui.classList.remove('hidden');
        dashboard.classList.remove('visible');
        tapHint.classList.remove('visible');
      }
    });

    function tick() {
      secondsElapsed++;

      if (intervalTimestamps.includes(secondsElapsed)) {
        playChime();
      }

      updateDashboardUI();

      if (secondsElapsed >= totalSeconds) {
        endSession();
      }
    }

    // Live Math Metrics Update Controller
    function updateDashboardUI() {
      const timeRemaining = totalSeconds - secondsElapsed;

      // Look up the next scheduled chime in the timestamp layout array
      const nextChimeIndex = intervalTimestamps.find(time => time > secondsElapsed);
      const timeUntilNextBeep = nextChimeIndex ? (nextChimeIndex - secondsElapsed) : -1;

      valElapsed.innerText = formatTime(secondsElapsed);
      valRemaining.innerText = formatTime(timeRemaining);
      valNextBeep.innerText = nextChimeIndex ? formatTime(timeUntilNextBeep) : "Done";
    }

    function endSession() {
      clearInterval(timerInterval);
      isRunning = false;
      isPaused = false;

      playChime();
      setTimeout(() => { playChime(); }, 800);

      menuTitle.innerText = "Meditation";
      startBtn.innerText = "Begin Session";

      ui.classList.remove('hidden');
      dashboard.classList.remove('visible');
      tapHint.classList.remove('visible');
    }


    // --- Galaxy Engine Logic ---
    const canvas = document.getElementById('galaxyCanvas');
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    const particles = [];
    const particleCount = 600;
    const galaxyArms = 3;

    class Star {
      constructor() {
        this.reset();
        this.orbit = Math.random() * Math.PI * 2;
      }

      reset() {
        this.distance = Math.random() * (Math.min(width, height) * 0.45) + 10;
        this.speed = (0.005 + Math.random() * 0.01) * (1 - this.distance / (Math.min(width, height) * 0.5));
        if (this.speed < 0.001) this.speed = 0.001;
        this.size = Math.random() * 1.8 + 0.2;
        this.armOffset = (Math.floor(Math.random() * galaxyArms) * (Math.PI * 2 / galaxyArms));

        const hue = this.distance < 60 ? 200 + Math.random() * 40 : 240 + Math.random() * 40;
        const brightness = this.distance < 40 ? '100%' : '70%';
        this.color = `hsla(${hue}, 90%, ${brightness}, ${Math.random() * 0.6 + 0.4})`;
      }

      update() {
        if (isPaused) return;
        this.orbit += this.speed;
        this.x = width / 2 + Math.cos(this.orbit + this.armOffset + (this.distance * 0.008)) * this.distance;
        this.y = height / 2 + Math.sin(this.orbit + this.armOffset + (this.distance * 0.008)) * this.distance;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Star());
    }

    function animate() {
      ctx.fillStyle = 'rgba(5, 5, 16, 0.08)';
      ctx.fillRect(0, 0, width, height);

      particles.forEach(star => {
        star.update();
        star.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>

</html>
